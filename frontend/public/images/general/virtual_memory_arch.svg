<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" fill="none">
  <rect width="600" height="300" rx="16" fill="#111"/>

  <!-- Virtual Address -->
  <text x="80" y="28" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">VIRTUAL</text>
  <rect x="30" y="45" width="100" height="30" rx="6" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="80" y="65" fill="#aaa" font-size="9" font-family="monospace" text-anchor="middle">0x7fff...</text>
  <rect x="30" y="80" width="100" height="30" rx="6" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="80" y="100" fill="#aaa" font-size="9" font-family="monospace" text-anchor="middle">0x7ffe...</text>
  <rect x="30" y="115" width="100" height="30" rx="6" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="80" y="135" fill="#aaa" font-size="9" font-family="monospace" text-anchor="middle">0x7ffd...</text>
  <rect x="30" y="150" width="100" height="30" rx="6" stroke="#444" stroke-width="1" fill="#151515"/>
  <text x="80" y="170" fill="#666" font-size="9" font-family="monospace" text-anchor="middle">...</text>

  <!-- Arrow: Page Table Walk -->
  <line x1="140" y1="110" x2="210" y2="110" stroke="#444" stroke-width="1"/>
  <polygon points="210,106 220,110 210,114" fill="#444"/>
  <text x="180" y="100" fill="#555" font-size="8" font-family="sans-serif" text-anchor="middle">walk</text>

  <!-- Page Table (4-level) -->
  <text x="300" y="28" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">PAGE TABLES</text>
  <rect x="225" y="45" width="50" height="140" rx="8" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="250" y="118" fill="#777" font-size="9" font-family="monospace" text-anchor="middle" transform="rotate(-90, 250, 118)">PGD</text>
  <rect x="280" y="45" width="50" height="140" rx="8" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="305" y="118" fill="#777" font-size="9" font-family="monospace" text-anchor="middle" transform="rotate(-90, 305, 118)">P4D</text>
  <rect x="335" y="45" width="50" height="140" rx="8" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="360" y="118" fill="#777" font-size="9" font-family="monospace" text-anchor="middle" transform="rotate(-90, 360, 118)">PUD</text>
  <rect x="390" y="45" width="50" height="140" rx="8" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="415" y="118" fill="#777" font-size="9" font-family="monospace" text-anchor="middle" transform="rotate(-90, 415, 118)">PTE</text>

  <!-- Connecting lines between tables -->
  <line x1="275" y1="80" x2="280" y2="80" stroke="#444" stroke-width="1"/>
  <line x1="330" y1="80" x2="335" y2="80" stroke="#444" stroke-width="1"/>
  <line x1="385" y1="80" x2="390" y2="80" stroke="#444" stroke-width="1"/>

  <!-- Arrow to Physical -->
  <line x1="445" y1="110" x2="490" y2="110" stroke="#444" stroke-width="1"/>
  <polygon points="490,106 500,110 490,114" fill="#444"/>
  <text x="468" y="100" fill="#555" font-size="8" font-family="sans-serif" text-anchor="middle">map</text>

  <!-- Physical Address -->
  <text x="540" y="28" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">PHYSICAL</text>
  <rect x="500" y="50" width="80" height="28" rx="6" stroke="#555" stroke-width="1.5" fill="#1e1e1e"/>
  <text x="540" y="68" fill="#ccc" font-size="9" font-family="monospace" text-anchor="middle">Frame 42</text>
  <rect x="500" y="83" width="80" height="28" rx="6" stroke="#555" stroke-width="1.5" fill="#1e1e1e"/>
  <text x="540" y="101" fill="#ccc" font-size="9" font-family="monospace" text-anchor="middle">Frame 7</text>
  <rect x="500" y="116" width="80" height="28" rx="6" stroke="#555" stroke-width="1.5" fill="#1e1e1e"/>
  <text x="540" y="134" fill="#ccc" font-size="9" font-family="monospace" text-anchor="middle">Frame 193</text>
  <rect x="500" y="149" width="80" height="28" rx="6" stroke="#333" stroke-width="1" fill="#151515"/>
  <text x="540" y="167" fill="#555" font-size="9" font-family="monospace" text-anchor="middle">...</text>

  <!-- Bottom labels -->
  <text x="180" y="230" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">vmalloc: scattered frames</text>
  <text x="180" y="248" fill="#555" font-size="10" font-family="monospace" text-anchor="middle">kmalloc: contiguous frames</text>

  <!-- Bottom label -->
  <text x="300" y="280" fill="#444" font-size="12" font-family="sans-serif" text-anchor="middle" letter-spacing="1">Linux Virtual-to-Physical Address Translation</text>
</svg>
