<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" fill="none">
  <rect width="600" height="280" rx="16" fill="#111"/>

  <!-- Clients -->
  <text x="60" y="30" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">CLIENTS</text>
  <circle cx="60" cy="60" r="16" stroke="#444" stroke-width="1.5" fill="#1a1a1a"/>
  <circle cx="60" cy="100" r="16" stroke="#444" stroke-width="1.5" fill="#1a1a1a"/>
  <circle cx="60" cy="140" r="16" stroke="#444" stroke-width="1.5" fill="#1a1a1a"/>
  <circle cx="60" cy="180" r="16" stroke="#444" stroke-width="1.5" fill="#1a1a1a"/>

  <!-- Arrow 1 -->
  <line x1="85" y1="120" x2="145" y2="120" stroke="#444" stroke-width="1"/>
  <polygon points="145,116 155,120 145,124" fill="#444"/>
  <text x="115" y="110" fill="#555" font-size="8" font-family="monospace" text-anchor="middle">HTTP</text>

  <!-- Server -->
  <text x="195" y="30" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">SERVER</text>
  <rect x="160" y="95" width="70" height="50" rx="8" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <text x="195" y="124" fill="#aaa" font-size="11" font-family="monospace" text-anchor="middle">accept()</text>

  <!-- Arrow 2 -->
  <line x1="235" y1="120" x2="285" y2="120" stroke="#444" stroke-width="1"/>
  <polygon points="285,116 295,120 285,124" fill="#444"/>
  <text x="260" y="110" fill="#555" font-size="8" font-family="monospace" text-anchor="middle">enqueue</text>

  <!-- Queue -->
  <text x="355" y="30" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">SCHEDULER</text>
  <rect x="300" y="85" width="24" height="35" rx="4" stroke="#555" stroke-width="1" fill="#222"/>
  <rect x="328" y="85" width="24" height="35" rx="4" stroke="#555" stroke-width="1" fill="#222"/>
  <rect x="356" y="85" width="24" height="35" rx="4" stroke="#555" stroke-width="1" fill="#1a1a1a"/>
  <rect x="384" y="85" width="24" height="35" rx="4" stroke="#333" stroke-width="1" fill="#141414"/>
  <rect x="412" y="85" width="24" height="35" rx="4" stroke="#333" stroke-width="1" fill="#141414"/>
  <text x="355" y="145" fill="#555" font-size="8" font-family="monospace" text-anchor="middle">SFF Order</text>

  <!-- Arrow 3 -->
  <line x1="440" y1="120" x2="480" y2="120" stroke="#444" stroke-width="1"/>
  <polygon points="480,116 490,120 480,124" fill="#444"/>
  <text x="460" y="110" fill="#555" font-size="8" font-family="monospace" text-anchor="middle">dequeue</text>

  <!-- Thread Pool -->
  <text x="530" y="30" fill="#555" font-size="10" font-family="sans-serif" text-anchor="middle" letter-spacing="2">THREADS</text>
  <rect x="510" y="50" width="38" height="38" rx="6" stroke="#555" stroke-width="1.5" fill="#1e1e1e"/>
  <text x="529" y="74" fill="#ccc" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">T1</text>
  <rect x="510" y="96" width="38" height="38" rx="6" stroke="#555" stroke-width="1.5" fill="#1e1e1e"/>
  <text x="529" y="120" fill="#ccc" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">T2</text>
  <rect x="510" y="142" width="38" height="38" rx="6" stroke="#333" stroke-width="1" fill="#151515"/>
  <text x="529" y="166" fill="#555" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">T3</text>
  <rect x="510" y="188" width="38" height="38" rx="6" stroke="#333" stroke-width="1" fill="#151515"/>
  <text x="529" y="212" fill="#555" font-size="11" font-family="monospace" text-anchor="middle" font-weight="bold">T4</text>

  <!-- Bottom label -->
  <text x="300" y="260" fill="#444" font-size="12" font-family="sans-serif" text-anchor="middle" letter-spacing="1">Multi-threaded HTTP/1.0 Server Architecture</text>
</svg>
